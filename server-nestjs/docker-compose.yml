version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: curio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: curio
      POSTGRES_USER: curio
      POSTGRES_PASSWORD: curio
    ports:
      - "5432:5432"
    volumes:
      - curio_pg:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/00-init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: curio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - curio_redis:/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: curio-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@curio.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  curio_pg:
  curio_redis:
